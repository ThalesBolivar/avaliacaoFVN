services:
  mysql:
    image: mysql:8.0
    container_name: avaliacao_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sistema_avaliacao}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER:-avaliacao_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - avaliacao_net

  redis:
    image: redis:7-alpine
    container_name: avaliacao_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - avaliacao_net

  minio:
    image: minio/minio:latest
    container_name: avaliacao_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - avaliacao_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avaliacao_backend
    restart: unless-stopped
    env_file: .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - avaliacao_net

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: avaliacao_celery
    restart: unless-stopped
    command: celery -A app.celery_app worker --loglevel=info -Q default,pdf,importacao
    env_file: .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - avaliacao_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: avaliacao_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - avaliacao_net

  nginx:
    image: nginx:1.25-alpine
    container_name: avaliacao_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - avaliacao_net

networks:
  avaliacao_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  minio_data:
